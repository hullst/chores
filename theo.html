<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Theo Chores">
<title>Theo's Chores</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: #000;
    color: #fff;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
  }

  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 12px;
    color: #888;
    font-size: 14px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #333;
    border-top-color: #7B5CF5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #app { display: none; padding-bottom: 48px; }

  .header {
    background: #111;
    padding: 10px 12px 8px;
    position: sticky;
    top: 0;
    z-index: 9;
    border-bottom: 1px solid #222;
  }

  .header h1 { font-size: 17px; font-weight: 700; }
  .header h1 em { font-style: normal; color: #7B5CF5; }

  .prog-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .prog-track { flex: 1; height: 5px; background: #333; border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: #30D158; border-radius: 3px; transition: width 0.3s; }
  .prog-txt { font-size: 11px; font-weight: 700; color: #888; white-space: nowrap; }

  .sec-head {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    padding: 10px 12px 3px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 12px;
    background: #1a1a1a;
    border-bottom: 1px solid #222;
    cursor: pointer;
    min-height: 52px;
  }

  .row:active { background: #252525; }
  .row.done { opacity: 0.4; }

  .ico { font-size: 20px; flex-shrink: 0; }
  .mid { flex: 1; }
  .lbl { font-size: 15px; font-weight: 600; }
  .row.done .lbl { text-decoration: line-through; color: #555; }
  .tm { font-size: 10px; color: #555; margin-top: 1px; }

  .chk {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid #444;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    font-weight: 700;
    color: #000;
  }

  .row.done .chk { background: #30D158; border-color: #30D158; }

  .done-msg {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 28px 20px;
    text-align: center;
    gap: 6px;
  }

  .done-msg.show { display: flex; }
  .done-msg .big { font-size: 48px; }
  .done-msg h2 { font-size: 20px; font-weight: 700; }
  .done-msg p { font-size: 13px; color: #888; }

  .sync {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    border: 1px solid #333;
    color: #888;
    font-size: 10px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 5px;
    z-index: 20;
  }

  .sync.syncing { color: #f7971e; }
  .sync.synced  { color: #30D158; }
  .sync.error   { color: #ff453a; }

  .dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .dot.spin { animation: pulse 0.8s ease-in-out infinite; }

  @keyframes pulse {
    0%,100% { opacity:1; } 50% { opacity:0.2; }
  }

  @media (max-width: 200px) {
    .lbl { font-size: 12px; }
    .ico { font-size: 15px; }
    .chk { width: 22px; height: 22px; font-size: 11px; }
    .row { padding: 8px; min-height: 40px; gap: 8px; }
    .tod-btn { font-size: 9px; }
    .header h1 { font-size: 13px; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading...</span>
</div>

<div id="app">
  <div class="header">
    <h1>⭐ <em>Theo's</em> Chores</h1>
    <div class="prog-row">
      <div class="prog-track"><div class="prog-fill" id="pFill" style="width:0%"></div></div>
      <div class="prog-txt" id="pTxt">0/0</div>
    </div>
  </div>

  <div class="done-msg" id="doneMsg">
    <div class="big">🎉</div>
    <h2>All done, Theo!</h2>
    <p>Crushing it!</p>
  </div>

  <div id="list"></div>
</div>

<div class="sync synced" id="sync">
  <div class="dot" id="dot"></div>
  <span id="synctxt">Synced</span>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyBImvAIHP_3S9aDl0_yjhwtGG5pf1e5Z7k",
  authDomain: "hull-chores.firebaseapp.com",
  projectId: "hull-chores"
});
var db = firebase.firestore();

var KID = 'theodore';

// ── CHORE LIST ──
// Built from same logic as index.html: rotation epoch Mar 1 2025, Theo = index 0
var ROTATION_EPOCH = new Date('2025-03-01T00:00:00');
var MORNING_ROTATION = [
  { label:'Vacuum living room', icon:'🧹' },
  { label:'Vacuum front room',  icon:'🧹' },
  { label:'Load dishwasher',    icon:'🍽️' },
  { label:'Empty dishwasher',   icon:'🍽️' },
];
var EVENING_ROTATION = [
  { label:'Wipe kitchen counter', icon:'🧽' },
  { label:'Wipe kitchen table',   icon:'🧹' },
  { label:'Tineco kitchen floor', icon:'🤖' },
  { label:'Take out trash',       icon:'🗑️' },
];

function getRotIdx() {
  var msPerDay = 86400000;
  return (((new Date() - ROTATION_EPOCH) / msPerDay | 0) % 4 + 4) % 4;
}
function isSunday() { return new Date().getDay() === 0; }
function getDateString(d) { return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate(); }
function getTodayKey() {
  var d = new Date();
  return (d.getDay()===6 ? 'saturday_' : 'sunday_') + getDateString(d);
}

function buildChores() {
  if (!isSunday()) {
    return [
      { label:'Make bed',                    icon:'🛏️' },
      { label:'Brush teeth',                 icon:'🪥' },
      { label:'Get dressed',                 icon:'👕' },
      { label:'Eat breakfast',               icon:'🥣' },
      { label:'Bring plates to sink',        icon:'🫧' },
      { label:'Unload dishwasher',           icon:'🍽️' },
      { label:'Wipe bathroom sink',          icon:'🚿' },
      { label:'Go kiss Momma good morning!', icon:'💋' },
      { label:'Eat lunch',                   icon:'🥪' },
      { label:'Bring lunch plates to sink',  icon:'🫧' },
      { label:'Help fold laundry',           icon:'👕' },
      { label:'Put away lunch stuff',        icon:'🧹' },
      { label:'Clean pool bathroom',         icon:'🚿' },
      { label:'Eat dinner',                  icon:'🍽️' },
      { label:'Bring dinner plates to sink', icon:'🫧' },
      { label:'Eat dessert',                 icon:'🍨' },
      { label:'Take out trash',              icon:'🗑️' },
    ];
  }
  var r = getRotIdx();
  var mc = MORNING_ROTATION[r % 4];
  var ec = EVENING_ROTATION[r % 4];
  return [
    { label:'Make bed',                    icon:'🛏️' },
    { label:'Brush teeth',                 icon:'🪥' },
    { label:'Get dressed for church',      icon:'⛪' },
    { label:'Eat breakfast',               icon:'🥣' },
    { label:'Bring plates to sink',        icon:'🫧' },
    { label:mc.label,                      icon:mc.icon },
    { label:'Go kiss Momma good morning!', icon:'💋' },
    { label:'Eat lunch',                   icon:'🥪' },
    { label:'Bring lunch plates to sink',  icon:'🫧' },
    { label:'Put away lunch stuff',        icon:'🧹' },
    { label:'Eat dinner',                  icon:'🍽️' },
    { label:'Bring dinner plates to sink', icon:'🫧' },
    { label:'Eat dessert',                 icon:'🍨' },
    { label:ec.label,                      icon:ec.icon },
  ];
}

var CHORES = buildChores();
var state = {};
var unsub = null;

function docRef() { return db.collection('chores').doc(getTodayKey()); }

function subscribe() {
  if (unsub) unsub();
  setSyncing('syncing');
  unsub = docRef().onSnapshot(function(snap) {
    state = snap.exists ? (snap.data().state || {}) : {};
    setSyncing('synced');
    render();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }, function(e) {
    setSyncing('error');
    // Show app anyway with empty state
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    render();
  });
}

function save() {
  setSyncing('syncing');
  docRef().set({ state: state, updatedAt: Date.now() })
    .then(function() { setSyncing('synced'); })
    .catch(function() { setSyncing('error'); });
}

function setSyncing(s) {
  var el = document.getElementById('sync');
  var dot = document.getElementById('dot');
  var txt = document.getElementById('synctxt');
  if (!el) return;
  el.className = 'sync ' + s;
  dot.className = 'dot' + (s === 'syncing' ? ' spin' : '');
  txt.textContent = s === 'syncing' ? 'Syncing...' : s === 'synced' ? 'Synced' : 'Error';
}

function choreKey(label) { return 'morning__' + KID + '__' + label; }

function toggle(label) {
  var k = choreKey(label);
  if (!state[KID]) state[KID] = {};
  var was = state[KID][k] && state[KID][k].done;
  state[KID][k] = { done: !was, ts: Date.now() };
  render();
  save();
}

function render() {
  var kidState = state[KID] || {};
  var doneCt = 0;
  var html = '';

  for (var i = 0; i < CHORES.length; i++) {
    var ch = CHORES[i];
    var k = choreKey(ch.label);
    var done = !!(kidState[k] && kidState[k].done);
    if (done) doneCt++;
    var ts = kidState[k] && kidState[k].ts;
    var tStr = ts ? new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
    var safe = ch.label.replace(/'/g, "\'");
    html += '<div class="row' + (done ? ' done' : '') + '" onclick="toggle(\'' + safe + '\')">' +
      '<div class="chk">' + (done ? '✓' : '') + '</div>' +
      '<div class="ico">' + ch.icon + '</div>' +
      '<div class="mid">' +
        '<div class="lbl">' + ch.label + '</div>' +
        (done && tStr ? '<div class="tm">✓ ' + tStr + '</div>' : '') +
      '</div>' +
    '</div>';
  }

  document.getElementById('list').innerHTML = html;
  document.getElementById('pFill').style.width = (CHORES.length ? Math.round(doneCt/CHORES.length*100) : 0) + '%';
  document.getElementById('pTxt').textContent = doneCt + '/' + CHORES.length;

  var allDone = doneCt === CHORES.length && CHORES.length > 0;
  document.getElementById('doneMsg').className = 'done-msg' + (allDone ? ' show' : '');
}

subscribe();
</script>
</body>
</html>
